name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1 — Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2 — Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 3 — Setup Docker Buildx (for AMD64 platform)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 4 — Build and Push image to Docker Hub
      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/roommate-ledger:latest

      # Step 5 — SSH into EC2 and redeploy
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/roommate-ledger:latest
            docker stop roommate-api || true
            docker rm roommate-api || true
            docker run -d \
              --name roommate-api \
              --restart unless-stopped \
              -p 3000:3000 \
              --env-file /home/ubuntu/.env \
              ${{ secrets.DOCKER_USERNAME }}/roommate-ledger:latest
            docker image prune -f
